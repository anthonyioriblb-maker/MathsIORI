<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation : Symétrique d'un point — équerre et compas</title>
    <style>
        body { margin: 0; padding: 0; background: #fafafa;
               font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 900px; margin: 0 auto; padding: 10px; }
        .step-text {
            background: #e3f2fd; border-left: 5px solid #2196f3;
            padding: 15px 20px; margin: 15px 0; color: #1565c0;
            font-size: 17px; min-height: 60px; font-weight: 500;
            display: flex; align-items: center;
        }
        svg { display: block; margin: 0 auto; background: #fafafa;
              border: 2px solid #ddd; border-radius: 8px; }
        .controls { text-align: center; margin: 20px 0; }
        button {
            background: #3498db; color: white; border: none;
            padding: 14px 28px; margin: 8px; border-radius: 6px;
            cursor: pointer; font-size: 17px; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: all 0.3s;
        }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }
        button.reset { background: #e74c3c; }
        button.reset:hover { background: #c0392b; }
    </style>
</head>
<body>
<div class="container">
    <div class="step-text" id="stepText">
        Cliquez sur « Étape suivante » pour voir la construction étape par étape.
    </div>

    <!--
        GÉOMÉTRIE :
        (d) verticale à x=425.
        M=(175,300)  O=(425,300)  M'=(675,300)
        OM = OM' = 250

        Équerre : angle droit en (0,0) local.
          Leg vertical (le long de d, vers le haut) : (0,0)→(0,-140)
          Leg horizontal (⊥ à d, vers la gauche)   : (0,0)→(-255,0)
          Transform : translate(425, yPos), yPos glisse de 140 → 300.
          Quand yPos=300 : angle droit en O=(425,300), leg horizontal couvre M=(175,300) ✓

        Compas : tip à O=(425,300), rayon=250.
          Pencil part de M=(175,300), sweeps par le haut jusqu'à M'=(675,300).
          Angles : a1 = π (vers la gauche) → a2 = 2π (vers la droite) via 3π/2 (vers le haut).
          En coordonnées écran (y vers le bas) :
            sin(3π/2) = −1 → y = 300 + 250*(−1) = 50 ✓ (en haut du canvas)
    -->
    <svg id="anim" width="850" height="420" viewBox="0 0 850 420">

        <!-- ══ TOUJOURS VISIBLES ══ -->
        <!-- Axe (d) -->
        <line x1="425" y1="10" x2="425" y2="410" stroke="#333" stroke-width="2.5"/>
        <text x="430" y="24" font-size="18" fill="#333" font-weight="bold">(d)</text>

        <!-- Point M -->
        <line x1="169" y1="294" x2="181" y2="306" stroke="#2980b9" stroke-width="3"/>
        <line x1="181" y1="294" x2="169" y2="306" stroke="#2980b9" stroke-width="3"/>
        <text x="148" y="296" font-size="22" fill="#2980b9" font-weight="bold">M</text>

        <!-- ══ ÉTAPE 1 : ÉQUERRE ══ -->
        <!--
            Leg vertical : (0,0)→(0,-140)
            Leg horizontal : (0,0)→(−255,0)
            Hypotenuse : (−255,0)→(0,−140)
        -->
        <g id="setSquare" opacity="0" transform="translate(425,140)">
            <polygon points="0,0 0,-140 -255,0"
                     fill="rgba(100,180,255,0.25)" stroke="#2980b9"
                     stroke-width="2.5" stroke-linejoin="round"/>
            <!-- Petit carré angle droit en (0,0) -->
            <polyline points="-18,0 -18,-18 0,-18"
                      fill="none" stroke="#2980b9" stroke-width="1.8"/>
        </g>

        <!-- ══ ÉTAPE 2 : ligne perpendiculaire M→O→M' ══ -->
        <line id="perpLine" x1="175" y1="300" x2="675" y2="300"
              stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" opacity="0"/>

        <!-- ══ ÉTAPE 3 : angle droit en O + label O ══ -->
        <rect id="squareO" x="409" y="284" width="16" height="16"
              fill="white" stroke="#555" stroke-width="1.8" opacity="0"/>
        <text id="labelO" x="430" y="282" font-size="16" fill="#555" opacity="0">O</text>

        <!-- ══ ARC du compas (dessiné progressivement) ══ -->
        <path id="arcCompas" d="" stroke="#27ae60" stroke-width="2.5"
              fill="none" opacity="0"/>

        <!-- ══ MARQUES égalité OM = OM' ══ -->
        <g id="marks" opacity="0">
            <!-- marque sur OM -->
            <line x1="297" y1="292" x2="303" y2="308" stroke="#555" stroke-width="2.5"/>
            <!-- marque sur OM' -->
            <line x1="547" y1="292" x2="553" y2="308" stroke="#555" stroke-width="2.5"/>
        </g>

        <!-- ══ POINT M' ══ -->
        <g id="pointMp" opacity="0">
            <line x1="669" y1="294" x2="681" y2="306" stroke="#e74c3c" stroke-width="3"/>
            <line x1="681" y1="294" x2="669" y2="306" stroke="#e74c3c" stroke-width="3"/>
            <text x="686" y="296" font-size="22" fill="#e74c3c" font-weight="bold">M'</text>
        </g>

        <!-- ══ COMPAS ══ -->
        <g id="compass" opacity="0">
            <circle id="compassHinge" cx="0" cy="0" r="10"
                    fill="#ff8c00" stroke="#cc6600" stroke-width="2"/>
            <line id="compassPointBranch" x1="0" y1="0" x2="-5" y2="60"
                  stroke="#ff8c00" stroke-width="6"/>
            <circle id="compassPointTip" cx="-5" cy="60" r="6"
                    fill="#222" stroke="#000" stroke-width="2"/>
            <line id="compassPencilBranch" x1="0" y1="0" x2="5" y2="60"
                  stroke="#ff8c00" stroke-width="6"/>
            <rect id="compassPencilBody" x="0" y="50" width="10" height="25"
                  fill="#ff4444" stroke="#cc0000" stroke-width="2" rx="2"/>
            <polygon id="compassPencilTip" points="5,75 0,85 10,85" fill="#333"/>
            <circle id="compassPencilPoint" cx="5" cy="85" r="3" fill="#000"/>
        </g>

    </svg>

    <div class="controls">
        <button id="nextBtn" onclick="nextStep()">▶ Étape suivante</button>
        <button class="reset" onclick="resetAnimation()">🔄 Recommencer</button>
    </div>
</div>

<script>
// ── Coordonnées ──────────────────────────────────────────
const O  = {x: 425, y: 300};
const M  = {x: 175, y: 300};
const Mp = {x: 675, y: 300};
const RADIUS = 250;  // OM = OM' = 250

// Position de départ de l'équerre (angle droit en haut)
const EQ_START_Y = 140;
const EQ_END_Y   = 300;

let currentStep = 0;

const stepTexts = [
    'Cliquez sur « Étape suivante » pour voir la construction étape par étape.',
    '<strong style="color:#2980b9;font-size:20px;">1.</strong> Je place un côté de l\'angle droit de l\'équerre le long de (d), puis je fais glisser l\'équerre jusqu\'à ce que l\'autre côté passe par M.',
    '<strong style="color:#e74c3c;font-size:20px;">2.</strong> Je trace la perpendiculaire à (d) passant par M. Elle coupe (d) en O.',
    '<strong style="color:#555;font-size:20px;">3.</strong> Je marque le pied de la perpendiculaire en O. L\'équerre a servi, je la range.',
    '<strong style="color:#27ae60;font-size:20px;">4.</strong> J\'ouvre le compas à l\'écartement OM (pointe en O, mine en M).',
    '<strong style="color:#27ae60;font-size:20px;">5.</strong> Sans changer l\'écartement, je trace un arc de l\'autre côté de (d) : j\'obtiens M\', avec OM\' = OM.',
    '<strong style="color:#27ae60;font-size:20px;">6.</strong> M\' est le symétrique de M par rapport à (d). ✓'
];

const sleep = ms => new Promise(r => setTimeout(r, ms));
const el = id => document.getElementById(id);

// ── Équerre ──────────────────────────────────────────────
async function slideSquare(yStart, yEnd, duration) {
    const N = 50;
    for (let i = 0; i <= N; i++) {
        const t = i / N;
        const y = yStart + (yEnd - yStart) * t;
        el('setSquare').setAttribute('transform', `translate(425,${y})`);
        await sleep(duration / N);
    }
}

// ── Compas ───────────────────────────────────────────────
function setCompass(tip, pen) {
    const hx = (tip.x + pen.x) / 2, hy = (tip.y + pen.y) / 2;
    el('compassHinge').setAttribute('cx', hx);
    el('compassHinge').setAttribute('cy', hy);
    el('compassPointBranch').setAttribute('x1', hx);
    el('compassPointBranch').setAttribute('y1', hy);
    el('compassPointBranch').setAttribute('x2', tip.x);
    el('compassPointBranch').setAttribute('y2', tip.y);
    el('compassPointTip').setAttribute('cx', tip.x);
    el('compassPointTip').setAttribute('cy', tip.y);
    el('compassPencilBranch').setAttribute('x1', hx);
    el('compassPencilBranch').setAttribute('y1', hy);
    el('compassPencilBranch').setAttribute('x2', pen.x);
    el('compassPencilBranch').setAttribute('y2', pen.y);
    const ang = Math.atan2(pen.y - hy, pen.x - hx) * 180 / Math.PI + 90;
    el('compassPencilBody').setAttribute('transform',
        `translate(${pen.x},${pen.y - 15}) rotate(${ang})`);
    el('compassPencilTip').setAttribute('transform',
        `translate(${pen.x - 5},${pen.y}) rotate(${ang} 5 0)`);
    el('compassPencilPoint').setAttribute('cx', pen.x);
    el('compassPencilPoint').setAttribute('cy', pen.y);
}

async function compassOpen(tip, target, duration) {
    const N = 30;
    for (let i = 0; i <= N; i++) {
        const t = i / N;
        setCompass(tip, {
            x: tip.x + (target.x - tip.x) * t,
            y: tip.y + (target.y - tip.y) * t
        });
        await sleep(duration / N);
    }
}

// Balayage du compas en arc de cercle (tip fixe, pen suit l'arc)
// a1 → a2 en coordonnées Math (écran y-bas)
async function compassSweep(tip, radius, a1, a2, duration) {
    const N = 60;
    let path = '';
    for (let i = 0; i <= N; i++) {
        const t = i / N;
        const angle = a1 + (a2 - a1) * t;
        const pen = {
            x: tip.x + radius * Math.cos(angle),
            y: tip.y + radius * Math.sin(angle)
        };
        if (i === 0) path = `M ${pen.x} ${pen.y}`;
        else path += ` L ${pen.x} ${pen.y}`;
        setCompass(tip, pen);
        el('arcCompas').setAttribute('d', path);
        el('arcCompas').style.opacity = '1';
        await sleep(duration / N);
    }
}

// ── ÉTAPES ───────────────────────────────────────────────
async function nextStep() {
    const txt = el('stepText');
    const btn = el('nextBtn');
    if (currentStep >= 6) return;
    btn.disabled = true;

    // 1 : équerre glisse le long de (d) jusqu'à aligner avec M
    if (currentStep === 0) {
        txt.innerHTML = stepTexts[1];
        el('setSquare').setAttribute('transform', `translate(425,${EQ_START_Y})`);
        el('setSquare').style.opacity = '1';
        await sleep(600);
        await slideSquare(EQ_START_Y, EQ_END_Y, 2200);
        await sleep(800);
        currentStep = 1;
    }

    // 2 : tracer la perpendiculaire
    else if (currentStep === 1) {
        txt.innerHTML = stepTexts[2];
        el('perpLine').style.opacity = '1';
        await sleep(1200);
        currentStep = 2;
    }

    // 3 : marquer O, ranger l'équerre
    else if (currentStep === 2) {
        txt.innerHTML = stepTexts[3];
        el('squareO').style.opacity = '1';
        el('labelO').style.opacity  = '1';
        await sleep(800);
        el('setSquare').style.opacity = '0';
        await sleep(600);
        currentStep = 3;
    }

    // 4 : compas s'ouvre de O à M
    else if (currentStep === 3) {
        txt.innerHTML = stepTexts[4];
        el('compass').style.opacity = '1';
        setCompass(O, O);
        await sleep(500);
        await compassOpen(O, M, 1400);
        await sleep(800);
        currentStep = 4;
    }

    // 5 : le compas sweep de M à M' par le haut (arc visible)
    // a1 = π (pointe vers la gauche → M)
    // a2 = 2π (pointe vers la droite → M') via 3π/2 (haut du canvas, y=50)
    else if (currentStep === 4) {
        txt.innerHTML = stepTexts[5];
        await compassSweep(O, RADIUS, Math.PI, 2 * Math.PI, 2400);
        await sleep(800);
        currentStep = 5;
    }

    // 6 : M' apparaît, compas disparaît, marques
    else if (currentStep === 5) {
        txt.innerHTML = stepTexts[6];
        txt.style.background       = '#c8e6c9';
        txt.style.borderLeftColor  = '#4caf50';
        txt.style.color            = '#2e7d32';
        el('compass').style.opacity = '0';
        await sleep(400);
        el('pointMp').style.opacity = '1';
        await sleep(600);
        el('marks').style.opacity = '1';
        await sleep(400);
        currentStep = 6;
        btn.textContent = '✓ Terminé';
    }

    btn.disabled = false;
}

// ── RESET ─────────────────────────────────────────────────
function resetAnimation() {
    ['setSquare','perpLine','squareO','labelO',
     'arcCompas','marks','pointMp','compass'].forEach(id => {
        el(id).style.opacity = '0';
    });
    el('arcCompas').setAttribute('d', '');
    el('setSquare').setAttribute('transform', `translate(425,${EQ_START_Y})`);

    const txt = el('stepText');
    txt.innerHTML           = stepTexts[0];
    txt.style.background    = '#e3f2fd';
    txt.style.borderLeftColor = '#2196f3';
    txt.style.color         = '#1565c0';

    const btn = el('nextBtn');
    btn.textContent = '▶ Étape suivante';
    btn.disabled    = false;
    currentStep     = 0;
}
</script>
</body>
</html>
