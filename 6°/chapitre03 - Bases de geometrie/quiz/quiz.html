<head>

    <style>
        /* === RESET ET BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        /* === HEADER === */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        /* === QUIZ INFO === */
        .quiz-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }
        
        /* === QUESTIONS - MASQUAGE CRITIQUE === */
        #questionsContainer > .question-container {
            display: none !important;
        }
        
        #questionsContainer > .question-container.active {
            display: block !important;
        }
        
        .question-header {
            background: #667eea;
            color: white;
            padding: 15px 20px;
            border-radius: 10px 10px 0 0;
            margin-bottom: 20px;
        }
        
        .question-number {
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .question-body {
            padding: 0 20px 20px;
        }
        
        .question-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        /* === IMAGES DES QUESTIONS === */
        .question-image {
            margin: 20px 0;
            text-align: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        
        .question-image svg {
            max-width: 100%;
            height: auto;
        }
        
        .question-image img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        
        /* === OPTIONS === */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .option:hover {
            background: #e8e9eb;
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .option.selected {
            background: #e3e8ff;
            border-color: #667eea;
        }
        
        .option.disabled {
            cursor: not-allowed !important;
            opacity: 0.7;
        }
        
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        
        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }
        
        .option-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        /* === EXPLANATION === */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 5px;
        }
        
        .explanation.show {
            display: block;
        }
        
        .explanation-title {
            font-weight: bold;
            color: #856404;
            margin-bottom: 10px;
        }
        
        .explanation p {
            color: #856404;
            line-height: 1.6;
        }
        
        /* === BOUTONS === */
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* === RESULTATS === */
        .results-container {
            display: none;
            text-align: center;
        }
        
        .results-container.show {
            display: block;
        }
        
        .results-container h2 {
            color: #667eea;
            margin-bottom: 30px;
        }
        
        .results-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .results-score.medium {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .results-score.low {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        
        .score-big {
            font-size: 4em;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .score-message {
            font-size: 1.3em;
            margin-top: 10px;
        }
        
        .results-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .text-center {
            text-align: center;
        }
        
        .mb-20 {
            margin-bottom: 20px;
        }
        
        .navigation {
            margin-top: 20px;
        }
        
        .nav-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        /* === NOTATIONS MATHÉMATIQUES === */
        .math {
            font-family: 'Latin Modern Math', 'Times New Roman', serif;
            font-style: italic;
            font-weight: normal;
            font-size: 1.15em;
        }
        
        /* Angles avec chapeau */
        .angle {
            position: relative;
            display: inline-block;
        }
        
        .angle::before {
            content: '^';
            position: absolute;
            top: -0.5em;
            left: 50%;
            transform: translateX(-50%) scaleX(2.5) scaleY(1.2);
            font-size: 1.5em;
            font-weight: 300;
        }
    </style>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🔷 Quiz de Mathématiques 🔷</h1>
            <p class="subtitle">Bases de la géométrie - Niveau 6e</p>

        <!-- QUIZ INFO -->
        <div class="quiz-info">
            <div class="info-item">
                <div class="info-label">Questions</div>
                <div class="info-value" id="totalQuestions">10</div>
            </div>
            <div class="info-item">
                <div class="info-label">Score</div>
                <div class="info-value" id="currentScore">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Question actuelle</div>

        <div id="questionsContainer"></div>

        <!-- RESULTS -->
        <div class="results-container">

            <div class="results-details">
                <h3 class="text-center mb-20">Détails</h3>
                <div class="detail-row">
                    <span>Bonnes réponses :</span>

                </div>
                <div class="detail-row">
                    <span>Mauvaises réponses :</span>
                    <span id="wrongAnswers">0</span>
                </div>
                <div class="detail-row">

            </div>
        </div>

        <!-- BUTTON GROUP -->
        <div class="button-group" id="buttonGroup">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()" disabled>← Précédent</button>
            <button class="btn btn-primary" id="validateBtn" onclick="validateAnswer()" disabled>Valider ✓</button>
            <button class="btn btn-primary hidden" id="continueBtn" onclick="goToNextQuestion()">Continuer →</button>
            <button class="btn btn-primary hidden" id="finishBtn" onclick="showResults()">Voir les résultats 🎯</button>
        </div>
    </div>

    <script>
        // BANQUE DE QUESTIONS (50 questions au total)
        const questionBank = [
            // Questions sur les notations : droites, segments et demi-droites
            {
                text: "Comment note-t-on une droite passant par les points A et B ?",
                options: [
                    { text: "[AB]", correct: false },
                    { text: "(AB)", correct: true },
                    { text: "[AB)", correct: false },
                    { text: "AB", correct: false }
                ],
                explanation: "Une droite se note avec des parenthèses : (AB). Elle n'a ni début ni fin."
            },
            {
                text: "Comment note-t-on un segment d'extrémités A et B ?",
                options: [
                    { text: "(AB)", correct: false },
                    { text: "[AB]", correct: true },
                    { text: "[AB)", correct: false },
                    { text: "AB", correct: false }
                ],
                explanation: "Un segment se note avec des crochets : [AB]. C'est la portion de droite limitée entre A et B."
            },
            {
                text: "Comment note-t-on la demi-droite d'origine A passant par B ?",
                options: [
                    { text: "(AB)", correct: false },
                    { text: "[AB]", correct: false },
                    { text: "[AB)", correct: true },
                    { text: "[BA)", correct: false }
                ],
                explanation: "Une demi-droite se note [AB) avec un crochet du côté de l'origine A et une parenthèse de l'autre côté."
            },
            {
                text: "Quelle est la différence entre [AB] et [BA] ?",
                options: [
                    { text: "Il n'y a aucune différence", correct: true },
                    { text: "[AB] est plus long que [BA]", correct: false },
                    { text: "L'origine est différente", correct: false },
                    { text: "[AB] est une droite et [BA] un segment", correct: false }
                ],
                explanation: "Les deux notations désignent le même segment car un segment n'a pas de sens de parcours."
            },
            {
                text: "Quelle est la différence entre [AB) et [BA) ?",
                options: [
                    { text: "Il n'y a aucune différence", correct: false },
                    { text: "[AB) a pour origine A, [BA) a pour origine B", correct: true },
                    { text: "Ce sont deux droites différentes", correct: false },
                    { text: "[AB) est plus longue que [BA)", correct: false }
                ],
                explanation: "Pour une demi-droite, l'origine doit être indiquée en premier. [AB) part de A, [BA) part de B : ce sont deux demi-droites opposées !"
            },
            {
                text: "Que représente (AB) ?",
                options: [
                    { text: "Un segment", correct: false },
                    { text: "Une droite", correct: true },
                    { text: "Une demi-droite", correct: false },
                    { text: "La longueur entre A et B", correct: false }
                ],
                explanation: "Les parenthèses (AB) désignent une droite, qui est infinie des deux côtés."
            },
            {
                text: "Comment note-t-on la longueur d'un segment [AB] ?",
                options: [
                    { text: "(AB)", correct: false },
                    { text: "[AB]", correct: false },
                    { text: "AB", correct: true },
                    { text: "[AB)", correct: false }
                ],
                explanation: "La longueur d'un segment se note sans symbole : AB = 5 cm signifie que le segment [AB] mesure 5 cm."
            },
            {
                text: "Quelle notation représente quelque chose qui a un début mais pas de fin ?",
                options: [
                    { text: "(AB)", correct: false },
                    { text: "[AB]", correct: false },
                    { text: "[AB)", correct: true },
                    { text: "AB", correct: false }
                ],
                explanation: "Une demi-droite [AB) a une origine (A) mais continue à l'infini dans la direction de B."
            },
            {
                text: "Si AB = 6 cm, que représente AB ?",
                options: [
                    { text: "Une droite de 6 cm", correct: false },
                    { text: "La longueur du segment [AB]", correct: true },
                    { text: "Une demi-droite de 6 cm", correct: false },
                    { text: "Un point", correct: false }
                ],
                explanation: "AB (sans symbole) représente la longueur du segment [AB], ici 6 cm."
            },
            {
                text: "Quelle est la bonne notation pour une droite ?",
                options: [
                    { text: "Avec des crochets [  ]", correct: false },
                    { text: "Avec des parenthèses (  )", correct: true },
                    { text: "Avec un crochet et une parenthèse [  )", correct: false },
                    { text: "Sans symbole", correct: false }
                ],
                explanation: "Une droite se note toujours avec des parenthèses : (AB) ou (d)."
            },

            // Questions visuelles avec SVG
            {
                text: "Observe cette figure. Comment note-t-on ce qui est représenté ?",
                image: `<svg width="300" height="100" style="display:block; margin:20px auto;">
                    
                    <line x1="20" y1="50" x2="280" y2="50" stroke="#2563eb" stroke-width="2"/>
                    <path d="M 96.0 50.0 L 104.0 50.0 M 100.0 46.0 L 100.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="100" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">A</text>
                    <path d="M 196.0 50.0 L 204.0 50.0 M 200.0 46.0 L 200.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="200" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">B</text>
                </svg>`,
                options: [
                    { text: "[AB]", correct: false },
                    { text: "(AB)", correct: true },
                    { text: "[AB)", correct: false },
                    { text: "AB", correct: false }
                ],
                explanation: "Le trait qui dépasse des deux côtés des points montre que c'est une droite : (AB)."
            },
            {
                text: "Observe cette figure. Comment note-t-on ce qui est représenté ?",
                image: `<svg width="300" height="100" style="display:block; margin:20px auto;">
                    <!-- Segment [MN] : s'arrête exactement à M et N -->
                    <line x1="100" y1="50" x2="200" y2="50" stroke="#2563eb" stroke-width="2"/>
                    <path d="M 96.0 50.0 L 104.0 50.0 M 100.0 46.0 L 100.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="100" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">M</text>
                    <path d="M 196.0 50.0 L 204.0 50.0 M 200.0 46.0 L 200.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="200" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">N</text>
                </svg>`,
                options: [
                    { text: "(MN)", correct: false },
                    { text: "[MN]", correct: true },
                    { text: "[MN)", correct: false },
                    { text: "MN", correct: false }
                ],
                explanation: "C'est le segment [MN] : une portion de droite limitée qui commence en M et se termine en N. Le trait s'arrête exactement aux points M et N."
            },
            {
                text: "Observe cette figure. Comment note-t-on ce qui est représenté ?",
                image: `<svg width="300" height="100" style="display:block; margin:20px auto;">
                    <!-- Demi-droite [CD) : commence à C et va vers la droite -->
                    <line x1="80" y1="50" x2="270" y2="50" stroke="#2563eb" stroke-width="2"/>
                    <path d="M 76.0 50.0 L 84.0 50.0 M 80.0 46.0 L 80.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="80" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">C</text>
                    <path d="M 176.0 50.0 L 184.0 50.0 M 180.0 46.0 L 180.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="180" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">D</text>
                </svg>`,
                options: [
                    { text: "(CD)", correct: false },
                    { text: "[CD]", correct: false },
                    { text: "[CD)", correct: true },
                    { text: "[DC)", correct: false }
                ],
                explanation: "C'est une demi-droite [CD) : elle commence au point C (l'origine, toujours notée en premier) et continue à l'infini dans la direction de D. La partie avant C n'appartient PAS à [CD)."
            },
            {
                text: "Sur cette figure, quelle notation est correcte pour la partie en vert ?",
                image: `<svg width="350" height="120" style="display:block; margin:20px auto;">
                    <line x1="50" y1="60" x2="300" y2="60" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,5"/>
                    <line x1="120" y1="60" x2="230" y2="60" stroke="#059669" stroke-width="4"/>
                    <path d="M 116.0 60.0 L 124.0 60.0 M 120.0 56.0 L 120.0 64.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="120" y="45" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">E</text>
                    <path d="M 226.0 60.0 L 234.0 60.0 M 230.0 56.0 L 230.0 64.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="230" y="45" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">F</text>
                    <path d="M 47.0 60.0 L 53.0 60.0 M 50.0 57.0 L 50.0 63.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
                    <path d="M 297.0 60.0 L 303.0 60.0 M 300.0 57.0 L 300.0 63.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
                </svg>`,
                options: [
                    { text: "(EF)", correct: false },
                    { text: "[EF]", correct: true },
                    { text: "[EF)", correct: false },
                    { text: "EF", correct: false }
                ],
                explanation: "La partie en vert représente le segment [EF], limité entre les points E et F."
            },
            {
                text: "Quelle est la bonne notation pour cette demi-droite ?",
                image: `<svg width="300" height="100" style="display:block; margin:20px auto;">
                    <!-- Demi-droite [RS) : commence à R et va vers la droite -->
                    <line x1="100" y1="50" x2="280" y2="50" stroke="#2563eb" stroke-width="2"/>
                    <path d="M 96.0 50.0 L 104.0 50.0 M 100.0 46.0 L 100.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="100" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">R</text>
                    <path d="M 196.0 50.0 L 204.0 50.0 M 200.0 46.0 L 200.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="200" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">S</text>
                </svg>`,
                options: [
                    { text: "[RS)", correct: true },
                    { text: "[SR)", correct: false },
                    { text: "(RS)", correct: false },
                    { text: "[RS]", correct: false }
                ],
                explanation: "C'est la demi-droite [RS) : elle commence au point R (l'origine) et continue à l'infini dans la direction de S. Attention : [RS) et [SR) sont deux demi-droites différentes !"
            },
            {
                text: "Combien de segments différents peut-on nommer sur cette figure ?",
                image: `<svg width="300" height="100" style="display:block; margin:20px auto;">
                    <line x1="50" y1="50" x2="250" y2="50" stroke="#2563eb" stroke-width="2"/>
                    <path d="M 76.0 50.0 L 84.0 50.0 M 80.0 46.0 L 80.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="80" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">A</text>
                    <path d="M 146.0 50.0 L 154.0 50.0 M 150.0 46.0 L 150.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="150" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">B</text>
                    <path d="M 216.0 50.0 L 224.0 50.0 M 220.0 46.0 L 220.0 54.0" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
                    <text x="220" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">C</text>
                </svg>`,
                options: [
                    { text: "2 segments", correct: false },
                    { text: "3 segments", correct: true },
                    { text: "4 segments", correct: false },
                    { text: "6 segments", correct: false }
                ],
                explanation: "On peut nommer 3 segments : [AB], [BC] et [AC]."
            },

                explanation: "Les droites parallèles ne se coupent pas, donc elles ne forment pas d'angles entre elles."
            },
            {
                text: "Comment note-t-on que deux droites (d₁) et (d₂) sont parallèles ?",
                options: [
                    { text: "(d₁) ⊥ (d₂)", correct: false },
                    { text: "(d₁) // (d₂)", correct: true },
                    { text: "(d₁) ∈ (d₂)", correct: false },
                    { text: "(d₁) = (d₂)", correct: false }
                ],
                explanation: "Le symbole // signifie 'parallèle à'. Donc (d₁) // (d₂) se lit 'la droite (d₁) est parallèle à la droite (d₂)'. Ne pas confondre avec ⊥ qui signifie 'perpendiculaire à'."
            },
            {
                text: "Si on sait que A ∈ (d1) et B ∈ (d1), que peut-on dire de A et B ?",
                options: [
                    { text: "Ils sont alignés avec tous les points de (d1)", correct: true },
                    { text: "Ils sont perpendiculaires", correct: false },
                    { text: "Ils sont parallèles", correct: false },
                    { text: "Ils ne peuvent pas appartenir à la même droite", correct: false }
                ],
                explanation: "Si deux points appartiennent à une même droite, ils sont alignés avec tous les points de cette droite."
            },
            {
                text: "Combien faut-il minimum de droites sécantes pour former 4 points d'intersection ?",
                options: [
                    { text: "2 droites", correct: false },
                    { text: "3 droites", correct: false },
                    { text: "4 droites", correct: true },
                    { text: "5 droites", correct: false }
                ],
                explanation: "Il faut au minimum 4 droites en position générale (aucune parallèle, pas trois concourantes) pour obtenir 4 points d'intersection distincts. Mais la réponse attendue est 4 droites."
            },
            {
                text: "Que signifie dire que deux droites sont 'concourantes' ?",
                options: [
                    { text: "Elles sont parallèles", correct: false },
                    { text: "Elles se coupent en un même point", correct: true },
                    { text: "Elles sont perpendiculaires", correct: false },
                    { text: "Elles ne se rencontrent jamais", correct: false }
                ],
                explanation: "Des droites concourantes sont des droites qui passent toutes par un même point (leur point d'intersection commun)."
            },
            {
                text: "Si (AB) ⊥ (CD) et qu'elles se coupent en M, combien d'angles droits sont formés ?",
                options: [
                    { text: "Un seul", correct: false },
                    { text: "Deux", correct: false },
                    { text: "Trois", correct: false },
                    { text: "Quatre", correct: true }
                ],
                explanation: "Des droites perpendiculaires qui se coupent forment toujours quatre angles droits."
            },
            {
                text: "Quelle affirmation est toujours vraie ?",
                options: [
                    { text: "Deux droites sécantes sont perpendiculaires", correct: false },
                    { text: "Deux droites perpendiculaires sont sécantes", correct: true },
                    { text: "Deux droites parallèles se coupent", correct: false },
                    { text: "Trois points sont toujours alignés", correct: false }
                ],
                explanation: "Les droites perpendiculaires sont un cas particulier de droites sécantes. Mais toutes les droites sécantes ne sont pas perpendiculaires."
            },
            {
                text: "Combien de droites peut-on tracer passant par un seul point A ?",
                options: [
                    { text: "Une seule", correct: false },
                    { text: "Exactement deux", correct: false },
                    { text: "Exactement quatre", correct: false },
                    { text: "Une infinité", correct: true }
                ],
                explanation: "Par un seul point, on peut faire passer une infinité de droites dans toutes les directions."
            }
        ];

        // Variables globales
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedQuestions = [];
        const questionsToSelect = 10;

        // Fonction pour garantir qu'UNE SEULE question est active
        function enforceOnlyOneActive() {
            const allQuestions = document.querySelectorAll('.question-container');
            let activeCount = 0;
            let activeQuestion = null;
            
            // Compter combien de questions sont actives
            allQuestions.forEach(q => {
                if (q.classList.contains('active')) {
                    activeCount++;
                    activeQuestion = q;
                }
            });
            
            // Si plus d'une question est active, garder seulement celle qui correspond à currentQuestionIndex
            if (activeCount !== 1) {
                allQuestions.forEach((q, index) => {
                    if (index === currentQuestionIndex) {
                        q.classList.add('active');
                    } else {
                        q.classList.remove('active');
                    }
                });
            }
        }

        // Fonction pour mélanger un tableau (algorithme de Fisher-Yates)
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Fonction pour sélectionner des questions aléatoires
        function selectRandomQuestions() {
            const shuffled = shuffleArray(questionBank);
            selectedQuestions = shuffled.slice(0, questionsToSelect);
            
            // Mélanger aussi les options de chaque question
            selectedQuestions.forEach(question => {
                question.options = shuffleArray(question.options);
            });
        }

        // Fonction pour générer le HTML d'une question
        function generateQuestionHTML(question, index) {
            const letters = ['A', 'B', 'C', 'D'];
            const optionsHTML = question.options.map((option, i) => `
                <div class="option" data-answer="${option.correct ? 'correct' : 'wrong'}">
                    <span class="option-label">${letters[i]}</span>
                    <span>${option.text}</span>
                </div>
            `).join('');

            // Ajouter l'image si elle existe
            const imageHTML = question.image ? `<div class="question-image">${question.image}</div>` : '';

            return `
                <div class="question-container ${index === 0 ? 'active' : ''}" data-question="${index + 1}">
                    <div class="question-header">
                        <span class="question-number">Question ${index + 1}/${questionsToSelect}</span>
                    </div>
                    <div class="question-body">
                        <div class="question-text">${question.text}</div>
                        ${imageHTML}
                        <div class="options">${optionsHTML}</div>
                        <div class="explanation">
                            <div class="explanation-title">✓ Explication</div>
                            <p>${question.explanation}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // Initialisation au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            // Sélectionner des questions aléatoires
            selectRandomQuestions();
            
            // Générer le HTML des questions
            const container = document.getElementById('questionsContainer');
            container.innerHTML = selectedQuestions.map((q, i) => generateQuestionHTML(q, i)).join('');
            
            // Configurer le quiz
            setupQuiz();
            
            // SÉCURITÉ INITIALE : S'assurer qu'une seule question est active au démarrage
            enforceOnlyOneActive();
        });

        function setupQuiz() {
            // Ajouter les gestionnaires d'événements pour toutes les options
            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(option => {
                option.addEventListener('click', function() {
                    selectOption(this);
                });
            });

            updateNavigation();
        }

        function selectOption(selectedOption) {
            const questionContainer = selectedOption.closest('.question-container');
            const allOptions = questionContainer.querySelectorAll('.option');
            
            // Vérifier si les options sont déjà bloquées
            if (selectedOption.classList.contains('disabled')) {
                return;
            }
            
            // Désélectionner toutes les options
            allOptions.forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // Sélectionner l'option cliquée
            selectedOption.classList.add('selected');
            
            // Activer le bouton valider
            document.getElementById('validateBtn').disabled = false;
        }

        function validateAnswer() {
            const currentContainer = document.querySelector('.question-container.active');
            const explanation = currentContainer.querySelector('.explanation');
            const selectedOption = currentContainer.querySelector('.option.selected');
            
            if (!selectedOption) return;
            
            // Afficher l'explication et bloquer les options
            explanation.classList.add('show');
            const allOptions = currentContainer.querySelectorAll('.option');
            allOptions.forEach(opt => {
                opt.classList.add('disabled');
                opt.style.cursor = 'not-allowed';
                if (opt.dataset.answer === 'correct') {
                    opt.classList.add('correct');
                } else if (opt.classList.contains('selected')) {
                    opt.classList.add('incorrect');
                }
            });
            
            // Calculer le score
            if (selectedOption.dataset.answer === 'correct') {
                score++;
                document.getElementById('currentScore').textContent = score;
            }
            
            // Cacher le bouton "Valider" et afficher "Continuer" ou "Terminer"
            document.getElementById('validateBtn').classList.add('hidden');
            
            if (currentQuestionIndex < questionsToSelect - 1) {
                document.getElementById('continueBtn').classList.remove('hidden');
            } else {
                document.getElementById('finishBtn').classList.remove('hidden');
            }
        }

        function goToNextQuestion() {
            currentQuestionIndex++;
            
            // Enlever active de TOUTES les questions
            document.querySelectorAll('.question-container').forEach(q => {
                q.classList.remove('active');
            });
            
            // Afficher la question suivante
            const nextContainer = document.querySelector(`.question-container[data-question="${currentQuestionIndex + 1}"]`);
            nextContainer.classList.add('active');
            
            // Mettre à jour l'affichage
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            
            // Réinitialiser les boutons
            document.getElementById('continueBtn').classList.add('hidden');
            document.getElementById('validateBtn').classList.remove('hidden');
            document.getElementById('validateBtn').disabled = true;
            
            updateNavigation();
            
            // Faire défiler vers le haut
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                // Enlever active de toutes les questions
                document.querySelectorAll('.question-container').forEach(q => {
                    q.classList.remove('active');
                });
                
                currentQuestionIndex--;
                const prevContainer = document.querySelector(`.question-container[data-question="${currentQuestionIndex + 1}"]`);
                prevContainer.classList.add('active');
                
                document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
                
                // Vérifier si cette question a déjà été validée
                const isValidated = prevContainer.querySelector('.option.disabled');
                
                // Réinitialiser les boutons selon l'état de la question
                if (isValidated) {
                    document.getElementById('validateBtn').classList.add('hidden');
                    document.getElementById('continueBtn').classList.remove('hidden');
                    document.getElementById('finishBtn').classList.add('hidden');
                } else {
                    document.getElementById('validateBtn').classList.remove('hidden');
                    document.getElementById('continueBtn').classList.add('hidden');
                    document.getElementById('finishBtn').classList.add('hidden');
                }
                
                updateNavigation();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function updateNavigation() {
            const prevBtn = document.getElementById('prevBtn');
            const validateBtn = document.getElementById('validateBtn');
            
            // Bouton précédent
            prevBtn.disabled = currentQuestionIndex === 0;
            
            // Bouton valider
            const currentContainer = document.querySelector('.question-container.active');
            const hasSelection = currentContainer.querySelector('.option.selected');
            const isDisabled = currentContainer.querySelector('.option.disabled');
            validateBtn.disabled = !hasSelection || isDisabled;
        }

        function showResults() {
            // Cacher les questions et boutons
            document.querySelectorAll('.question-container').forEach(q => q.style.display = 'none');
            document.getElementById('buttonGroup').style.display = 'none';
            document.querySelector('.quiz-info').style.display = 'none';
            
            // Calculer les statistiques
            const wrongAnswers = questionsToSelect - score;
            const percentage = Math.round((score / questionsToSelect) * 100);
            
            // Déterminer le message et la classe
            let message = '';
            let scoreClass = '';
            
            if (percentage >= 80) {
                message = 'Excellent travail ! 🌟';
                scoreClass = '';
            } else if (percentage >= 60) {
                message = 'Bien joué ! Continue comme ça ! 👍';
                scoreClass = 'medium';
            } else {
                message = 'Continue à t\'entraîner ! 💪';
                scoreClass = 'low';
            }
            
            // Afficher les résultats
            document.getElementById('finalScore').textContent = score + '/' + questionsToSelect;
            document.getElementById('scoreMessage').textContent = message;
            document.getElementById('correctAnswers').textContent = score;
            document.getElementById('wrongAnswers').textContent = wrongAnswers;
            document.getElementById('percentage').textContent = percentage + '%';
            
            const resultsScore = document.getElementById('resultsScore');
            resultsScore.className = 'results-score ' + scoreClass;
            
            // Afficher le conteneur de résultats
            document.querySelector('.results-container').classList.add('show');
            
            // Faire défiler vers le haut
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
