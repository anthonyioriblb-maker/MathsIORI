                {type: 'age', person1: 'Tom', person2: 'sa cousine', ages1: [7,14,20], diff: 5},
                {type: 'age', person1: 'Emma', person2: 'sa grand-mère', ages1: [10,15,20], diff: 60},
                {type: 'age', person1: 'Léo', person2: 'son oncle', ages1: [4,8,16], diff: 25},
                {type: 'age', person1: 'Chloé', person2: 'sa tante', ages1: [9,12,18], diff: 22},
                {type: 'age', person1: 'Hugo', person2: 'son cousin', ages1: [6,10,14], diff: 2},
                {type: 'age', person1: 'Jade', person2: 'son grand-père', ages1: [8,12,16], diff: 65},
                
                // Aires - 8 questions
                {type: 'aire', shape: 'carré', sides: [2,4,6]},
                {type: 'aire', shape: 'carré', sides: [3,5,8]},
                {type: 'aire', shape: 'carré', sides: [1,3,7]},
                {type: 'aire', shape: 'carré', sides: [4,6,10]},
                {type: 'aire', shape: 'carré', sides: [2,5,9]},
                {type: 'aire', shape: 'carré', sides: [1,4,8]},
                {type: 'aire', shape: 'carré', sides: [3,6,9]},
                {type: 'aire', shape: 'carré', sides: [2,7,10]},
                
                // Prix fixes - 12 questions
                {type: 'fixe', service: 'taxi', base: 5, perUnit: 2, unit: 'km'},
                {type: 'fixe', service: 'plombier', base: 40, perUnit: 25, unit: 'heure'},
                {type: 'fixe', service: 'parking', base: 2, perUnit: 1.5, unit: 'heure'},
                {type: 'fixe', service: 'électricien', base: 50, perUnit: 30, unit: 'heure'},
                {type: 'fixe', service: 'dépanneuse', base: 80, perUnit: 3, unit: 'km'},
                {type: 'fixe', service: 'location de voiture', base: 20, perUnit: 0.5, unit: 'km'},
                {type: 'fixe', service: 'serrurier', base: 60, perUnit: 20, unit: 'heure'},
                {type: 'fixe', service: 'coursier', base: 10, perUnit: 1, unit: 'km'},
                {type: 'fixe', service: 'déménageur', base: 100, perUnit: 50, unit: 'heure'},
                {type: 'fixe', service: 'location de vélo', base: 5, perUnit: 2, unit: 'heure'},
                {type: 'fixe', service: 'menuisier', base: 45, perUnit: 35, unit: 'heure'},
                {type: 'fixe', service: 'jardinier', base: 30, perUnit: 20, unit: 'heure'},
                
                // Abonnements - 10 questions
                {type: 'abonnement', service: 'bibliothèque', price: 15, unit: 'livres'},
                {type: 'abonnement', service: 'piscine', price: 30, unit: 'entrées'},
                {type: 'abonnement', service: 'cinéma', price: 50, unit: 'films'},
                {type: 'abonnement', service: 'salle de sport', price: 40, unit: 'séances'},
                {type: 'abonnement', service: 'transport en commun', price: 60, unit: 'trajets'},
                {type: 'abonnement', service: 'musée', price: 25, unit: 'visites'},
                {type: 'abonnement', service: 'parc d\'attractions', price: 80, unit: 'entrées'},
                {type: 'abonnement', service: 'théâtre', price: 45, unit: 'spectacles'},
                {type: 'abonnement', service: 'streaming vidéo', price: 10, unit: 'films'},
                {type: 'abonnement', service: 'club de lecture', price: 20, unit: 'livres'},
                
                // Température - 1 question
                {type: 'temp'},
            ]
        };

        let quizData = [], currentQuestionIndex = 0, score = 0, selectedAnswer = null, answeredQuestions = [];

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function formatNumber(num) {
            if (num % 1 === 0) return num.toString();
            // Arrondir à 10 décimales pour éviter les erreurs de précision
            const rounded = Math.round(num * 10000000000) / 10000000000;
            // Formater avec au maximum 3 décimales
            const formatted = rounded.toFixed(3);
            // Supprimer les zéros inutiles à la fin et remplacer le point par une virgule
            return formatted.replace(/\.?0+$/, '').replace('.', ',');
        }

        function isCleanDecimal(num) {
            // Vérifier si le nombre a au maximum 3 décimales significatives
            const rounded = Math.round(num * 1000) / 1000;
            // Si l'arrondi à 3 décimales est très proche du nombre original, c'est bon
            return Math.abs(num - rounded) < 0.0001;
        }

        function createFraction(num, den) {
            return `<span class="fraction"><span class="fraction-numerator">${formatNumber(num)}</span><span class="fraction-denominator">${formatNumber(den)}</span></span>`;
        }

        function createRatioExplanation(val1_0, val2_0, val1_1, val2_1, val1_2, val2_2) {
            const ratio1 = val1_0 / val2_0;
            const ratio2 = val2_0 / val1_0;
            
            // Choisir le sens qui donne un nombre décimal propre
            if (isCleanDecimal(ratio1)) {
                return `${createFraction(val1_0, val2_0)} = ${formatNumber(ratio1)} ; ${createFraction(val1_1, val2_1)} = ${formatNumber(ratio1)} ; ${createFraction(val1_2, val2_2)} = ${formatNumber(ratio1)}`;
            } else {
                return `${createFraction(val2_0, val1_0)} = ${formatNumber(ratio2)} ; ${createFraction(val2_1, val1_1)} = ${formatNumber(ratio2)} ; ${createFraction(val2_2, val1_2)} = ${formatNumber(ratio2)}`;
            }
        }

        function generateProportionalQuestion(data) {
            // Si c'est un énoncé textuel
            if (data.cat === 'text') {
                return {
                    situation: data.situation,
                    isProportional: true,
                    explanation: data.explanation
                };
            }
            
            const reverse = Math.random() < 0.5;
            let header1, header2, row1, row2, explanation;

            if (data.cat === 'prix') {
                header1 = reverse ? `Prix (€)` : `Nombre de ${data.item}`;
                header2 = reverse ? `Nombre de ${data.item}` : `Prix (€)`;
                row1 = reverse ? data.values[1] : data.values[0];
                row2 = reverse ? data.values[0] : data.values[1];
                
                if (data.direction === 'up') {
                    explanation = `Oui ! Les rapports sont égaux : ${createRatioExplanation(row1[0], row2[0], row1[1], row2[1], row1[2], row2[2])}. C'est proportionnel !`;
                } else {
                    explanation = `Oui ! Les rapports sont égaux : ${createRatioExplanation(row2[0], row1[0], row2[1], row1[1], row2[2], row1[2])}. C'est proportionnel !`;
                }
            } else if (data.cat === 'vitesse') {
                header1 = reverse ? `Distance (km)` : `Temps (h)`;
                header2 = reverse ? `Temps (h)` : `Distance (km)`;
                row1 = reverse ? data.values[1] : data.values[0];
                row2 = reverse ? data.values[0] : data.values[1];
                
                const ratio1 = (data.direction === 'up') ? row1[0] / row2[0] : row2[0] / row1[0];
                const ratio2 = (data.direction === 'up') ? row2[0] / row1[0] : row1[0] / row2[0];
                
                if (isCleanDecimal(ratio1)) {
                    if (data.direction === 'up') {
                        explanation = `Oui ! Les rapports sont constants : ${createRatioExplanation(row1[0], row2[0], row1[1], row2[1], row1[2], row2[2])}. Vitesse : ${formatNumber(data.coef)} km/h.`;
                    } else {
                        explanation = `Oui ! Les rapports sont constants : ${createRatioExplanation(row2[0], row1[0], row2[1], row1[1], row2[2], row1[2])}. Vitesse : ${formatNumber(data.coef)} km/h.`;
                    }
                } else {
                    if (data.direction === 'up') {
                        explanation = `Oui ! Les rapports sont constants : ${createRatioExplanation(row2[0], row1[0], row2[1], row1[1], row2[2], row1[2])}. Vitesse : ${formatNumber(data.coef)} km/h.`;
                    } else {
                        explanation = `Oui ! Les rapports sont constants : ${createRatioExplanation(row1[0], row2[0], row1[1], row2[1], row1[2], row2[2])}. Vitesse : ${formatNumber(data.coef)} km/h.`;
                    }
                }
            } else if (data.cat === 'geo') {
                header1 = reverse ? 'Périmètre (cm)' : 'Côté (cm)';
                header2 = reverse ? 'Côté (cm)' : 'Périmètre (cm)';
                row1 = reverse ? data.values[1] : data.values[0];
                row2 = reverse ? data.values[0] : data.values[1];
                
                if (data.direction === 'up') {
                    explanation = `Oui ! Le périmètre d'un ${data.item.includes('carré') ? 'carré' : 'polygone régulier'} est proportionnel : ${createRatioExplanation(row1[0], row2[0], row1[1], row2[1], row1[2], row2[2])}.`;
                } else {
                    explanation = `Oui ! Le périmètre d'un ${data.item.includes('carré') ? 'carré' : 'polygone régulier'} est proportionnel : ${createRatioExplanation(row2[0], row1[0], row2[1], row1[1], row2[2], row1[2])}.`;
                }
            } else if (data.cat === 'recette') {
                header1 = reverse ? `Nombre de ${data.item}` : `Personnes`;
                header2 = reverse ? `Personnes` : `Nombre de ${data.item}`;
                row1 = reverse ? data.values[1] : data.values[0];
                row2 = reverse ? data.values[0] : data.values[1];
                
                if (data.direction === 'up') {
                    explanation = `Oui ! Les rapports sont égaux : ${createRatioExplanation(row1[0], row2[0], row1[1], row2[1], row1[2], row2[2])}.`;
                } else {
                    explanation = `Oui ! Les rapports sont égaux : ${createRatioExplanation(row2[0], row1[0], row2[1], row1[1], row2[2], row1[2])}.`;
                }
            } else {
                header1 = reverse ? 'Masse totale (g)' : 'Nombre';
                header2 = reverse ? 'Nombre' : 'Masse totale (g)';
                row1 = reverse ? data.values[1] : data.values[0];
                row2 = reverse ? data.values[0] : data.values[1];
                
                if (data.direction === 'up') {
                    explanation = `Oui ! Les rapports sont égaux : ${createRatioExplanation(row1[0], row2[0], row1[1], row2[1], row1[2], row2[2])}.`;
                } else {
                    explanation = `Oui ! Les rapports sont égaux : ${createRatioExplanation(row2[0], row1[0], row2[1], row1[1], row2[2], row1[2])}.`;
                }
            }

            return {header: header1, row1, row2Header: header2, row2, isProportional: true, explanation};
        }

        function generateNonProportionalQuestion(data) {
            if (data.type === 'age') {
                const ages2 = data.ages1.map(a => a + data.diff);
                const r1 = formatNumber(ages2[0] / data.ages1[0]);
                const r2 = formatNumber(ages2[1] / data.ages1[1]);
                return {
                    header: `Âge de ${data.person1}`, row1: data.ages1, row2Header: `Âge de ${data.person2}`, row2: ages2, isProportional: false,
                    explanation: `Non ! ${createFraction(ages2[0], data.ages1[0])} = ${r1} ; ${createFraction(ages2[1], data.ages1[1])} = ${r2}. Les rapports sont différents donc ce n'est pas proportionnel !`
                };
            } else if (data.type === 'aire') {
                const areas = data.sides.map(s => s * s);
                const r1 = formatNumber(areas[0] / data.sides[0]);
                const r2 = formatNumber(areas[1] / data.sides[1]);
                return {
                    header: `Côté d'un ${data.shape} (cm)`, row1: data.sides, row2Header: `Aire du ${data.shape} (cm²)`, row2: areas, isProportional: false,
                    explanation: `Non ! ${createFraction(areas[0], data.sides[0])} = ${r1} ; ${createFraction(areas[1], data.sides[1])} = ${r2}. Les rapports sont différents donc ce n'est pas proportionnel !`
                };
            } else if (data.type === 'fixe') {
                const val0 = data.base;
                const val1 = data.base + data.perUnit;
                const val2 = data.base + 2 * data.perUnit;
                const r1 = formatNumber(val1 / 1);
                const r2 = formatNumber(val2 / 2);
                return {
                    situation: `🚗 Un ${data.service} facture ${data.base} € de prise en charge + ${formatNumber(data.perUnit)} € par ${data.unit}.`,
                    isProportional: false,
                    explanation: `Non ! Pour 1 ${data.unit} : ${data.base} + ${formatNumber(data.perUnit)} = ${formatNumber(val1)} ; pour 2 ${data.unit} : ${data.base} + 2 × ${formatNumber(data.perUnit)} = ${formatNumber(val2)}. Donc ${createFraction(val1, 1)} = ${r1} ; ${createFraction(val2, 2)} = ${r2}. Les rapports sont différents donc ce n'est pas proportionnel !`
                };
            } else if (data.type === 'abonnement') {
                const r1 = formatNumber(data.price / 5);
                const r2 = formatNumber(data.price / 10);
                return {
                    situation: `📚 ${data.service.charAt(0).toUpperCase() + data.service.slice(1)} : abonnement annuel de ${data.price} € pour un nombre illimité de ${data.unit}.`,
                    isProportional: false,
                    explanation: `Non ! ${createFraction(data.price, 5)} = ${r1} ; ${createFraction(data.price, 10)} = ${r2}. Les rapports sont différents donc ce n'est pas proportionnel !`
                };
            } else {
                const c1 = 10;
                const c2 = 20;
                const f1 = 1.8 * c1 + 32;
                const f2 = 1.8 * c2 + 32;
                const r1 = formatNumber(f1 / c1);
                const r2 = formatNumber(f2 / c2);
                return {
                    situation: `🌡️ Conversion de température Celsius vers Fahrenheit avec la formule : F = 1,8C + 32`,
                    isProportional: false,
                    explanation: `Non ! ${createFraction(f1, c1)} = ${r1} ; ${createFraction(f2, c2)} = ${r2}. Les rapports sont différents donc ce n'est pas proportionnel !`
                };
            }
        }

        function generateQuiz() {
            const propShuffled = shuffleArray(questionBank.proportional);
            const nonPropShuffled = shuffleArray(questionBank.nonProportional);
            const selectedProp = propShuffled.slice(0, 4).map(d => generateProportionalQuestion(d));
            const selectedNonProp = nonPropShuffled.slice(0, 4).map(d => generateNonProportionalQuestion(d));
            const allQuestions = shuffleArray([...selectedProp, ...selectedNonProp]);
            quizData = allQuestions.map((data, index) => ({question: index + 1, correctAnswer: data.isProportional ? 0 : 1, data}));
            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            quizData.forEach((q, index) => {
                const data = q.data;
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container' + (index === 0 ? ' active' : '');
                questionDiv.id = `question${q.question}`;
                let contentHTML = '';
                if (data.situation) {
                    contentHTML = `<div class="question-text">Cette situation est-elle une situation de proportionnalité ?</div><div class="situation-text">${data.situation}</div>`;
                } else {
                    contentHTML = `<div class="question-text">Ce tableau représente-t-il une situation de proportionnalité ?</div><div class="table-container"><table><tr><th>${data.header}</th>${data.row1.map(val => `<td>${formatNumber(val)}</td>`).join('')}</tr><tr><th>${data.row2Header}</th>${data.row2.map(val => `<td>${formatNumber(val)}</td>`).join('')}</tr></table></div>`;
                }
                questionDiv.innerHTML = `<div class="question-header"><div class="question-number">Question ${q.question}/8</div></div><div class="question-body">${contentHTML}<div class="options"><div class="option" onclick="selectOption(${q.question}, 0)"><span class="option-label">A</span><span>Oui, c'est une situation de proportionnalité</span></div><div class="option" onclick="selectOption(${q.question}, 1)"><span class="option-label">B</span><span>Non, ce n'est pas une situation de proportionnalité</span></div></div><div class="explanation" id="explanation${q.question}"><div class="explanation-title">💡 Explication</div>${data.explanation}</div></div>`;
                container.appendChild(questionDiv);
            });
        }

        function setNextEnabled(enabled) {
            const next = document.getElementById('nextBtn');
            const floating = document.getElementById('floatingNextBtn');
            if (next) next.disabled = !enabled;
            if (floating) floating.disabled = !enabled;
        }

        function selectOption(questionNum, optionIndex) {
            if (answeredQuestions.includes(questionNum)) return;
            const options = document.querySelectorAll(`#question${questionNum} .option`);
            options.forEach(opt => opt.classList.remove('selected'));
            options[optionIndex].classList.add('selected');
            selectedAnswer = optionIndex;
            document.getElementById('validateBtn').disabled = false;
        }

        function validateAnswer() {
            const questionNum = currentQuestionIndex + 1;
            const correctAnswerIndex = quizData[currentQuestionIndex].correctAnswer;
            const options = document.querySelectorAll(`#question${questionNum} .option`);
            answeredQuestions.push(questionNum);
            options.forEach(opt => {
                opt.classList.add('disabled');
                opt.style.cursor = 'not-allowed';
            });
            if (selectedAnswer === correctAnswerIndex) {
                options[selectedAnswer].classList.add('correct');
                score++;
            } else {
                options[selectedAnswer].classList.add('incorrect');
                options[correctAnswerIndex].classList.add('correct');
            }
            document.getElementById(`explanation${questionNum}`).classList.add('show');
            document.getElementById('currentScore').textContent = score;
            document.getElementById('validateBtn').style.display = 'none';
            if (currentQuestionIndex < quizData.length - 1) {
                setNextEnabled(true);
                document.getElementById('finishBtn').disabled = true;
            } else {
                setNextEnabled(false);
                document.getElementById('finishBtn').disabled = false;
            }
        }

        function nextQuestion() {
            document.getElementById(`question${currentQuestionIndex + 1}`).classList.remove('active');
            currentQuestionIndex++;
            document.getElementById(`question${currentQuestionIndex + 1}`).classList.add('active');
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            selectedAnswer = null;
            document.getElementById('validateBtn').style.display = 'block';
            document.getElementById('validateBtn').disabled = true;
            setNextEnabled(false);
            document.getElementById('finishBtn').disabled = true;
            if (currentQuestionIndex > 0) {
                document.getElementById('prevBtn').style.display = 'block';
            }
        }

        function previousQuestion() {
            document.getElementById(`question${currentQuestionIndex + 1}`).classList.remove('active');
            currentQuestionIndex--;
            document.getElementById(`question${currentQuestionIndex + 1}`).classList.add('active');
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            if (currentQuestionIndex === 0) {
                document.getElementById('prevBtn').style.display = 'none';
            }
            if (answeredQuestions.includes(currentQuestionIndex + 1)) {
                document.getElementById('validateBtn').style.display = 'none';
                if (currentQuestionIndex < quizData.length - 1) {
                    setNextEnabled(true);
                    document.getElementById('finishBtn').disabled = true;
                } else {
                    document.getElementById('finishBtn').disabled = false;
                    setNextEnabled(false);
                }
            } else {
                document.getElementById('validateBtn').style.display = 'block';
                setNextEnabled(false);
                document.getElementById('finishBtn').disabled = true;
            }
        }

        function showResults() {
            document.querySelector('.quiz-info').style.display = 'none';
            document.querySelectorAll('.question-container').forEach(q => q.style.display = 'none');
            document.getElementById('quizButtons').style.display = 'none';
            document.getElementById('initialNav').style.display = 'none';
            const floating = document.getElementById('floatingNextBtn');
            if (floating) {
                floating.style.display = 'none';
            }
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');
            const totalQuestions = quizData.length;
            const incorrectCount = totalQuestions - score;
            const percentageValue = Math.round((score / totalQuestions) * 100);
            document.getElementById('scoreBig').textContent = `${score}/${totalQuestions}`;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('incorrectCount').textContent = incorrectCount;
            document.getElementById('percentage').textContent = percentageValue + '%';
            const resultsScore = document.getElementById('resultsScore');
            const scoreMessage = document.getElementById('scoreMessage');
            if (percentageValue === 100) {
                scoreMessage.textContent = '🏆 Parfait ! Tu reconnais parfaitement les situations de proportionnalité !';
                resultsScore.className = 'results-score';
            } else if (percentageValue >= 75) {
                scoreMessage.textContent = '🌟 Très bien ! Tu as bien compris la proportionnalité !';
                resultsScore.className = 'results-score';
            } else if (percentageValue >= 50) {
                scoreMessage.textContent = '👍 Pas mal ! Révise les cas particuliers (âges, aires, prix fixes) !';
                resultsScore.className = 'results-score medium';
            } else {
                scoreMessage.textContent = '💪 Continue à t\'entraîner, tu vas y arriver !';
                resultsScore.className = 'results-score low';
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            selectedAnswer = null;
            answeredQuestions = [];
            generateQuiz();
            document.querySelector('.quiz-info').style.display = 'flex';
            document.getElementById('quizButtons').style.display = 'flex';
            document.getElementById('initialNav').style.display = 'flex';
            document.getElementById('resultsContainer').classList.remove('show');
            document.getElementById('validateBtn').style.display = 'block';
            document.getElementById('validateBtn').disabled = true;
            document.getElementById('prevBtn').style.display = 'none';
            setNextEnabled(false);
            document.getElementById('finishBtn').disabled = true;
            const floatingBtn = document.getElementById('floatingNextBtn');
            if (floatingBtn) {
                floatingBtn.style.display = 'inline-block';
            }
            document.getElementById('currentQuestion').textContent = '1';
            document.getElementById('currentScore').textContent = '0';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        generateQuiz();
    </script>
