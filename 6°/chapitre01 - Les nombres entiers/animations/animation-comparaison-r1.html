<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparaison – Règle 1</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f4f8;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 30px;
}

.compare-wrap {
  background: white; border-radius: 12px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
  padding: 24px; width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  margin-bottom: 14px;
}

.nombres-row {
  display: flex; align-items: center; gap: 30px; flex-wrap: wrap; justify-content: center;
}

.nombre-bloc {
  display: flex; align-items: flex-end; gap: 0;
  padding: 10px 18px; background: #f5f5f5;
  border-radius: 10px; border: 3px solid #ddd;
  transition: all 0.4s; justify-content: center; min-width: 80px;
}
.nombre-bloc.winner { border-color: #4caf50; background: #e8f5e9; }
.nombre-bloc.loser  { border-color: #f44336; background: #ffebee; }

.chiffre-box { display: inline-flex; flex-direction: column; align-items: center; margin: 0 4px; }
.chiffre-val {
  font-size: 2.2rem; font-weight: bold; color: #333;
  width: 40px; text-align: center; line-height: 1;
  transition: all 0.35s; border-radius: 6px; padding: 2px;
}
.chiffre-val.hl {
  background: #2196f3; color: white;
  transform: scale(1.2); box-shadow: 0 3px 8px rgba(33,150,243,0.4);
}
.chiffre-label { font-size: 0.62rem; color: #999; margin-top: 3px; font-weight: 600; }

.symbole-comp {
  font-size: 3.5rem; font-weight: bold;
  opacity: 0; transform: scale(0.5); transition: all 0.5s;
  min-width: 60px; text-align: center;
}
.symbole-comp.visible { opacity: 1; transform: scale(1); }
.symbole-comp.gt { color: #4caf50; }
.symbole-comp.lt { color: #f44336; }

.comptage-row {
  display: flex; gap: 60px; justify-content: center; flex-wrap: wrap;
}
.comptage-bloc {
  text-align: center; font-size: 1rem; color: #555;
  opacity: 0; transition: all 0.5s; transform: translateY(10px);
}
.comptage-bloc.visible { opacity: 1; transform: translateY(0); }
.comptage-val { font-size: 2.5rem; font-weight: bold; display: block; }

.conclusion {
  font-size: 1.6rem; font-weight: bold; text-align: center;
  opacity: 0; transform: scale(0.8); transition: all 0.5s;
  padding: 10px 24px; border-radius: 10px;
}
.conclusion.visible { opacity: 1; transform: scale(1); }

.step-box {
  background: #e3f2fd; border-left: 5px solid #2196f3;
  padding: 14px 20px; border-radius: 0 8px 8px 0;
  font-size: 1rem; color: #1565c0; width: 100%;
  min-height: 52px; display: block; line-height: 1.6;
  font-weight: 500; margin-bottom: 14px;
}

.progress-bar-wrap { width: 100%; background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 14px; overflow: hidden; }
.progress-bar { height: 8px; background: linear-gradient(90deg, #2196f3, #4caf50); border-radius: 8px; width: 0%; transition: width 0.4s; }

.controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
button {
  padding: 11px 22px; border: none; border-radius: 8px;
  font-size: 0.95rem; font-weight: bold; cursor: pointer;
  transition: all 0.25s; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
button:hover { transform: translateY(-2px); }
button:disabled { background: #bdbdbd !important; color: #fff; cursor: not-allowed; transform: none; }
#btnReset    { background: #f44336; color: white; }
#btnPrev     { background: #ff9800; color: white; }
#btnNext     { background: #2196f3; color: white; }
#btnAuto     { background: #4caf50; color: white; }
</style>
</head>
<body>

<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<div class="compare-wrap">
  <div class="nombres-row">
    <div class="nombre-bloc" id="blocA">
      <div class="chiffre-box"><div class="chiffre-val" id="cA0">5</div><div class="chiffre-label">centaines</div></div>
      <div class="chiffre-box"><div class="chiffre-val" id="cA1">3</div><div class="chiffre-label">dizaines</div></div>
      <div class="chiffre-box"><div class="chiffre-val" id="cA2">7</div><div class="chiffre-label">unités</div></div>
    </div>
    <div class="symbole-comp" id="symbole"></div>
    <div class="nombre-bloc" id="blocB">
      <div class="chiffre-box"><div class="chiffre-val" id="cB0">8</div><div class="chiffre-label">dizaines</div></div>
      <div class="chiffre-box"><div class="chiffre-val" id="cB1">9</div><div class="chiffre-label">unités</div></div>
    </div>
  </div>
  <div class="comptage-row">
    <div class="comptage-bloc" id="countA">
      <span class="comptage-val" style="color:#2196f3">3</span>
      <span>chiffres</span>
    </div>
    <div class="comptage-bloc" id="countB">
      <span class="comptage-val" style="color:#e91e63">2</span>
      <span>chiffres</span>
    </div>
  </div>
  <div class="conclusion" id="conclusion">537 &gt; 89</div>
</div>

<div class="step-box" id="stepBox"></div>

<div class="controls">
  <button id="btnReset" onclick="reset()">↺ Recommencer</button>
  <button id="btnPrev"  onclick="prev()" disabled>◀ Précédente</button>
  <button id="btnNext"  onclick="next()">Suivante ▶</button>
  <button id="btnAuto"  onclick="toggleAuto()">⏵ Automatique</button>
</div>

<script>
const steps = [
  {
    msg: 'On compte le nombre de chiffres de chaque nombre.',
    action: 'count'
  },
  {
    msg: '<strong>537</strong> a <strong>3 chiffres</strong> et <strong>89</strong> a <strong>2 chiffres</strong>. Le nombre avec le plus de chiffres est le plus grand.',
    action: 'highlight_count'
  },
  {
    msg: '✅ <strong>537 &gt; 89</strong> car 537 possède plus de chiffres que 89.',
    action: 'result'
  }
];

let etape = -1, autoMode = false, autoTimer = null;

function applyStep(i) {
  const s = steps[i];
  document.getElementById('stepBox').innerHTML = s.msg;
  document.getElementById('progressBar').style.width = ((i + 1) / steps.length * 100) + '%';
  document.getElementById('btnPrev').disabled = (i <= 0);
  document.getElementById('btnNext').disabled = (i >= steps.length - 1);

  // Nettoyer
  ['cA0','cA1','cA2','cB0','cB1'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('hl');
  });
  document.getElementById('countA').classList.remove('visible');
  document.getElementById('countB').classList.remove('visible');
  document.getElementById('blocA').className = 'nombre-bloc';
  document.getElementById('blocB').className = 'nombre-bloc';
  document.getElementById('symbole').className = 'symbole-comp';
  document.getElementById('symbole').textContent = '';
  document.getElementById('conclusion').classList.remove('visible');

  if (s.action === 'count') {
    ['cA0','cA1','cA2'].forEach(id => document.getElementById(id).classList.add('hl'));
    ['cB0','cB1'].forEach(id => document.getElementById(id).classList.add('hl'));
  }
  if (s.action === 'highlight_count') {
    ['cA0','cA1','cA2'].forEach(id => document.getElementById(id).classList.add('hl'));
    ['cB0','cB1'].forEach(id => document.getElementById(id).classList.add('hl'));
    document.getElementById('countA').classList.add('visible');
    document.getElementById('countB').classList.add('visible');
  }
  if (s.action === 'result') {
    document.getElementById('blocA').classList.add('winner');
    document.getElementById('blocB').classList.add('loser');
    const sym = document.getElementById('symbole');
    sym.textContent = '>'; sym.className = 'symbole-comp visible gt';
    const conclu = document.getElementById('conclusion');
    conclu.style.color = '#4caf50'; conclu.style.border = '3px solid #4caf50';
    conclu.classList.add('visible');
    stopAuto();
  }
}

function reset() {
  stopAuto(); etape = -1;
  document.getElementById('stepBox').innerHTML = '';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('btnPrev').disabled = true;
  document.getElementById('btnNext').disabled = false;
  ['cA0','cA1','cA2','cB0','cB1'].forEach(id => document.getElementById(id).classList.remove('hl'));
  document.getElementById('countA').classList.remove('visible');
  document.getElementById('countB').classList.remove('visible');
  document.getElementById('blocA').className = 'nombre-bloc';
  document.getElementById('blocB').className = 'nombre-bloc';
  document.getElementById('symbole').className = 'symbole-comp';
  document.getElementById('symbole').textContent = '';
  document.getElementById('conclusion').classList.remove('visible');
}

function next() {
  if (etape < steps.length - 1) { etape++; applyStep(etape); }
  if (etape >= steps.length - 1) stopAuto();
}
function prev() {
  if (etape > 0) { etape--; applyStep(etape); }
}

function toggleAuto() {
  if (autoMode) { stopAuto(); return; }
  autoMode = true;
  document.getElementById('btnAuto').textContent = '⏸ Pause';
  document.getElementById('btnAuto').style.background = '#ff9800';
  autoTimer = setInterval(() => { if (etape >= steps.length - 1) { next(); stopAuto(); } else { next(); } }, 2000);
}
function stopAuto() {
  autoMode = false; clearInterval(autoTimer); autoTimer = null;
  document.getElementById('btnAuto').textContent = '⏵ Automatique';
  document.getElementById('btnAuto').style.background = '#4caf50';
}
</script>
</body>
</html>
