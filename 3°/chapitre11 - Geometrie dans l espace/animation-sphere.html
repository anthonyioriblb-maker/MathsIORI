<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Construction d'une Sphère — Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07071a; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #ui {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ccd;
    font-size: 14px;
    pointer-events: none;
    user-select: none;
  }
  #ui h2 {
    font-size: 18px;
    color: #aaf;
    margin-bottom: 8px;
    font-weight: 600;
  }
  #angles { margin-top: 4px; font-size: 13px; color: #99b; font-family: monospace; }
  #done {
    display: none;
    margin-top: 10px;
    color: #7ffa7f;
    font-size: 15px;
    font-weight: bold;
  }

  #legend {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #ccd;
    font-size: 13px;
    pointer-events: none;
  }
  .leg-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .leg-color {
    width: 24px; height: 4px; border-radius: 2px;
  }

  #controls {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }
  button {
    padding: 9px 20px;
    background: rgba(100,120,200,0.18);
    color: #cce;
    border: 1px solid rgba(150,160,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  button:hover { background: rgba(100,120,200,0.35); }

  #progress-bar-wrap {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
  }
  #progress-bar-bg {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4488ff, #ff4488);
    border-radius: 4px;
    transition: width 0.1s;
  }
</style>
</head>
<body>

<div id="ui">
  <h2>Construction d'une Sphère</h2>
  <div>Un rayon tourne et trace sa trajectoire</div>
  <div id="angles">θ = 0.0°&nbsp;&nbsp;φ = 0.0°</div>
  <div id="done">✓ Sphère complète !</div>
</div>

<div id="legend">
  <div class="leg-item">
    <div class="leg-color" style="background:#ffee44;height:3px;"></div>
    <span>Rayon R</span>
  </div>
  <div class="leg-item">
    <div class="leg-color" style="background:radial-gradient(circle, #ff4444, #ff8844);width:12px;height:12px;border-radius:50%;"></div>
    <span>Extrémité mobile</span>
  </div>
  <div class="leg-item">
    <div class="leg-color" style="background:linear-gradient(90deg,#4488ff,#ff4488);"></div>
    <span>Trace de l'extrémité</span>
  </div>
</div>

<div id="progress-bar-wrap">
  <div id="progress-bar-bg"><div id="progress-bar"></div></div>
</div>

<div id="controls">
  <button onclick="restart()">↺ Recommencer</button>
  <button id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
  <button id="speedBtn" onclick="cycleSpeed()">Vitesse ×1</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x07071a, 0.06);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 2.5, 7);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ── Constants ──────────────────────────────────────────────────────────────
const R = 2;
const TURNS = 22;          // spirale : nb de tours pour couvrir la sphère
const TOTAL_T = TURNS * Math.PI * 2;
const MAX_PTS = 8000;
const ADD_INTERVAL = TOTAL_T / MAX_PTS;

// ── State ──────────────────────────────────────────────────────────────────
let t = 0;
let lastAdded = -ADD_INTERVAL;
let paused = false;
let speed = 1;
let done = false;
let camAngle = 0;

// ── Geometry helpers ───────────────────────────────────────────────────────
function spherePoint(t) {
  const theta = (t / TOTAL_T) * Math.PI; // 0→π  (pôle N → pôle S)
  const phi   = t;                        // angle azimutal continu
  return {
    x: R * Math.sin(theta) * Math.cos(phi),
    y: R * Math.cos(theta),
    z: R * Math.sin(theta) * Math.sin(phi),
    theta, phi
  };
}

// ── Trace points ───────────────────────────────────────────────────────────
const positions = new Float32Array(MAX_PTS * 3);
const colors    = new Float32Array(MAX_PTS * 3);
let   ptCount   = 0;

const traceGeo = new THREE.BufferGeometry();
traceGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
traceGeo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
traceGeo.setDrawRange(0, 0);

const traceMat = new THREE.PointsMaterial({
  size: 0.06,
  vertexColors: true,
  transparent: true,
  opacity: 0.85,
  sizeAttenuation: true
});
scene.add(new THREE.Points(traceGeo, traceMat));

function addTracePoint(x, y, z, progress) {
  if (ptCount >= MAX_PTS) return;
  const i = ptCount * 3;
  positions[i]   = x;
  positions[i+1] = y;
  positions[i+2] = z;

  // Couleur arc-en-ciel selon la progression
  const h = progress; // 0→1
  const r = Math.max(0, Math.sin(h * Math.PI * 2));
  const g = Math.max(0, Math.sin(h * Math.PI * 2 - Math.PI * 2/3));
  const b = Math.max(0, Math.sin(h * Math.PI * 2 + Math.PI * 2/3));
  // Palette bleue→cyan→verte→jaune→rouge (plus pédagogique)
  colors[i]   = Math.max(0, Math.min(1, h * 2));
  colors[i+1] = Math.max(0, Math.min(1, h < 0.5 ? h * 2 : (1 - h) * 2));
  colors[i+2] = Math.max(0, Math.min(1, 1 - h * 2));

  ptCount++;
  traceGeo.attributes.position.needsUpdate = true;
  traceGeo.attributes.color.needsUpdate    = true;
  traceGeo.setDrawRange(0, ptCount);
}

// ── Sphère fantôme (fil de fer) ────────────────────────────────────────────
const ghostSphere = new THREE.Mesh(
  new THREE.SphereGeometry(R, 24, 16),
  new THREE.MeshBasicMaterial({ color: 0x4466aa, wireframe: true, transparent: true, opacity: 0.12 })
);
scene.add(ghostSphere);

// ── Rayon (ligne) ──────────────────────────────────────────────────────────
const radPosArr = new Float32Array(6);
const radGeo    = new THREE.BufferGeometry();
radGeo.setAttribute('position', new THREE.BufferAttribute(radPosArr, 3));
// Ligne en tirets simulée par un matériau jaune vif
const radMat  = new THREE.LineBasicMaterial({ color: 0xffee44 });
const radLine = new THREE.Line(radGeo, radMat);
scene.add(radLine);

// Petits traits perpendiculaires aux deux extrémités du rayon (ticks)
const tick0Geo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-0.12, 0, 0), new THREE.Vector3(0.12, 0, 0)
]);
const tickEndGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-0.12, 0, 0), new THREE.Vector3(0.12, 0, 0)
]);
const tickMat = new THREE.LineBasicMaterial({ color: 0xffee44 });
const tick0   = new THREE.Line(tick0Geo, tickMat);
const tickEnd = new THREE.Line(tickEndGeo, tickMat);
scene.add(tick0);
scene.add(tickEnd);

// ── Label "R" (sprite canvas) ──────────────────────────────────────────────
function makeTextSprite(text) {
  const c = document.createElement('canvas');
  c.width = 96; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = 'bold italic 44px Georgia, serif';
  ctx.fillStyle = 'rgba(255,238,80,1)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 48, 32);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp  = new THREE.Sprite(mat);
  sp.scale.set(0.5, 0.33, 1);
  return sp;
}
const labelR = makeTextSprite('R');
scene.add(labelR);

// ── Extrémité mobile ────────────────────────────────────────────────────────
const tipMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.09, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xff4444 })
);
scene.add(tipMesh);

// Halo autour du tip
const haloMat = new THREE.MeshBasicMaterial({
  color: 0xff6666, transparent: true, opacity: 0.25, side: THREE.BackSide
});
const haloMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), haloMat);
tipMesh.add(haloMesh);

// ── Centre ─────────────────────────────────────────────────────────────────
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(0.05, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
));

// ── Axe vertical (Y) ───────────────────────────────────────────────────────
const axisGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, -R * 1.3, 0),
  new THREE.Vector3(0,  R * 1.3, 0)
]);
scene.add(new THREE.Line(axisGeo,
  new THREE.LineBasicMaterial({ color: 0x334466, linewidth: 1 })));

// ── Plan équatorial (grille circulaire) ────────────────────────────────────
const equatorPts = [];
for (let i = 0; i <= 128; i++) {
  const a = (i / 128) * Math.PI * 2;
  equatorPts.push(new THREE.Vector3(R * Math.cos(a), 0, R * Math.sin(a)));
}
scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints(equatorPts),
  new THREE.LineBasicMaterial({ color: 0x223355, linewidth: 1 })
));

// ── Grille sol ─────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(10, 14, 0x1a1a33, 0x111122);
grid.position.y = -R * 1.3;
scene.add(grid);

// ── Éclairage ──────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x404060, 1));
const pt = new THREE.PointLight(0x8899ff, 1.2, 20);
pt.position.set(4, 6, 4);
scene.add(pt);

// ── Boucle d'animation ─────────────────────────────────────────────────────
const anglesEl     = document.getElementById('angles');
const doneEl       = document.getElementById('done');
const progressBar  = document.getElementById('progress-bar');
const speedBtn     = document.getElementById('speedBtn');
const pauseBtn     = document.getElementById('pauseBtn');
const SPEEDS       = [1, 2, 4];
let   speedIndex   = 0;

let prevTime = null;

function animate(now) {
  requestAnimationFrame(animate);
  if (prevTime === null) prevTime = now;
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;

  if (!paused && !done) {
    t += dt * speed * 1.8;
    if (t >= TOTAL_T) { t = TOTAL_T; done = true; doneEl.style.display = 'block'; }

    const { x, y, z, theta, phi } = spherePoint(t);

    // Mise à jour rayon
    radPosArr[3] = x; radPosArr[4] = y; radPosArr[5] = z;
    radGeo.attributes.position.needsUpdate = true;

    // Mise à jour tip
    tipMesh.position.set(x, y, z);

    // Label R au milieu du rayon
    labelR.position.set(x / 2, y / 2 + 0.18, z / 2);

    // Tick au centre (O) — orienté perpendiculairement au rayon
    tick0.position.set(0, 0, 0);
    tick0.lookAt(x, y, z);

    // Tick à l'extrémité — même orientation
    tickEnd.position.set(x, y, z);
    tickEnd.lookAt(0, 0, 0);

    // Pulsation du halo
    const s = 1 + 0.25 * Math.sin(now * 0.008);
    haloMesh.scale.setScalar(s);

    // Ajout point de trace
    if (t - lastAdded >= ADD_INTERVAL) {
      addTracePoint(x, y, z, t / TOTAL_T);
      lastAdded = t;
    }

    // UI
    anglesEl.textContent =
      `θ = ${(theta * 180 / Math.PI).toFixed(1)}°   φ = ${(phi * 180 / Math.PI % 360).toFixed(1)}°`;
    progressBar.style.width = (t / TOTAL_T * 100).toFixed(1) + '%';
  }

  // Rotation caméra lente
  camAngle += dt * (done ? 0.15 : 0.25);
  const dist = 7;
  camera.position.x = Math.sin(camAngle) * dist;
  camera.position.z = Math.cos(camAngle) * dist;
  camera.position.y = 2.5 + Math.sin(camAngle * 0.4) * 0.8;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ── Contrôles ──────────────────────────────────────────────────────────────
function restart() {
  t = 0; lastAdded = -ADD_INTERVAL; done = false;
  ptCount = 0;
  positions.fill(0); colors.fill(0);
  traceGeo.attributes.position.needsUpdate = true;
  traceGeo.attributes.color.needsUpdate    = true;
  traceGeo.setDrawRange(0, 0);
  doneEl.style.display = 'none';
  progressBar.style.width = '0%';
}

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ Reprendre' : '⏸ Pause';
}

function cycleSpeed() {
  speedIndex = (speedIndex + 1) % SPEEDS.length;
  speed = SPEEDS[speedIndex];
  speedBtn.textContent = `Vitesse ×${speed}`;
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
